name: openidconnect_windows
description: Windows implementation for OpenIdConnect.
version: 2.0.1
homepage: https://github.com/4D-Technologies/openidconnect_flutter/tree/main/openidconnect_windows

resolution: workspace

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  native_authentication: ^0.1.5
  openidconnect_platform_interface: ^2.0.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: openidconnect
    platforms:
      windows:
        dartPluginClass: OpenIdConnectWindows
        fileName: openidconnect_windows.dart
