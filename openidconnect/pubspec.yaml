name: openidconnect
description: OpenIdConnect library for flutter.
version: 2.0.0
homepage: https://github.com/4D-Technologies/openidconnect_flutter

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  openidconnect_android: ^2.0.0
  openidconnect_darwin: ^2.0.0
  openidconnect_linux: ^2.0.0
  openidconnect_platform_interface: ^2.0.0
  openidconnect_web: ^2.0.0
  openidconnect_windows: ^2.0.0
  crypto: ">=3.0.0 <4.0.0"
  url_launcher: ">=6.3.0 <7.0.0"
  http: ">=1.0.0 <2.0.0"
  retry: ">=3.1.2 <4.0.0"

dev_dependencies:
  flutter_lints:
  flutter_test:
    sdk: flutter
  mockito: 

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  plugin:
    platforms:
      android:
        default_package: openidconnect_android
      ios:
        default_package: openidconnect_darwin
      macos:
        default_package: openidconnect_darwin
      linux:
        default_package: openidconnect_linux
      web:
        default_package: openidconnect_web
      windows:
        default_package: openidconnect_windows
