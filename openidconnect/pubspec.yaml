name: openidconnect
description: OpenIdConnect library for flutter.
version: 1.0.44
homepage: https://github.com/4D-Technologies/openidconnect_flutter

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.5.3"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  openidconnect_platform_interface: ^1.0.17
  openidconnect_web: ^1.0.26
  # openidconnect_windows: ^0.0.6
  jwt_decoder: ^2.0.1

  url_launcher: ^6.3.2
  http: ^1.6.0
  retry: ^3.1.2

  # TODO Remove these once native implementations can be added. Refactor so that the native implementations don't need to do the full cycle through.
  webview_flutter: ^4.13.1
  encrypt_shared_preferences: ^1.0.1
  cryptography_plus: ^3.0.0

dev_dependencies:
  flutter_lints:
  flutter_test:
    sdk: flutter
  mockito: 

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  plugin:
    platforms:
      web:
        default_package: openidconnect_web
      # windows:
      #   default_package: openidconnect_windows
